# Re-uses the migrations shipped in packages/database/. The API container does
# not run migrations itself; this file exists so an operator can run
# `alembic -c apps/api/alembic.ini upgrade head` from a checkout without
# changing directory.
#
# Optional: symlink for convenience:
#   ln -s ../../packages/database/migrations apps/api/migrations

[alembic]
script_location = ../../packages/database/migrations
prepend_sys_path = ../../packages/database
sqlalchemy.url = postgresql+psycopg://factory:factory@postgres:5432/factory
timezone = UTC
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
