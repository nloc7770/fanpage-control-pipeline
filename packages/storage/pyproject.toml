[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "storage"
version = "0.1.0"
description = "Storage backend abstraction (local FS + S3) for the assets table."
requires-python = ">=3.11"
dependencies = [
    "loguru>=0.7",
    "pydantic>=2.6",
    "shared-py",
]

[project.optional-dependencies]
s3 = ["boto3>=1.34"]

[tool.setuptools.packages.find]
where = ["."]
include = ["storage*"]

[tool.ruff]
line-length = 100
target-version = "py311"
