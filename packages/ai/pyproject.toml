[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai"
version = "0.1.0"
description = "Qwen client + prompt templates + JSON repair for the LLM stage."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "loguru>=0.7",
    "pydantic>=2.6",
    "shared-py",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["ai*"]

[tool.ruff]
line-length = 100
target-version = "py311"
