[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "database"
version = "0.1.0"
description = "Async SQLAlchemy 2.x models and Alembic migrations for Shortform Factory."
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0.29",
    "asyncpg>=0.29",
    "psycopg[binary]>=3.1",
    "alembic>=1.13",
    "pydantic>=2.6",
    "shared-py",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["database*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["sqlalchemy.ext.mypy.plugin"]
