# Shortform Factory Redis config
# Tuned for a single-host dev/staging setup acting as Celery broker,
# Celery result backend, and SSE pub/sub.

bind 0.0.0.0
protected-mode no
port 6379
timeout 0
tcp-keepalive 300

# Memory and eviction. Keep results small; eviction does not affect pub/sub.
maxmemory 1gb
maxmemory-policy allkeys-lru

# Persistence. We keep AOF for broker durability but no fsync per write.
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# Pub/sub: do not buffer slow subscribers forever.
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Logging
loglevel notice
logfile ""

# Disable potentially dangerous commands in dev.
rename-command FLUSHALL ""
rename-command FLUSHDB ""
